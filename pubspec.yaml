name: attendance
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  supabase_flutter: ^2.12.0
  geolocator: ^13.0.1
  permission_handler: ^12.0.1
  flutter_dotenv: ^5.1.0
  mobile_scanner: ^7.2.0

  # --- Phase 1: Face & ML (Strict versions for compatibility) ---
  # Upgraded to 0.13.1 to satisfy facial_liveness_verification
  google_mlkit_face_detection: ^0.13.1
  google_mlkit_face_mesh_detection: ^0.4.2

  # Run MobileFaceNet .tflite on-device
  tflite_flutter: ^0.11.0

  # Image processing
  image: ^4.8.0

  # Camera version required by the liveness package
  camera: ^0.11.4

  # Temp directory access for InputImage.fromFilePath
  path_provider: ^2.1.5

  # --- Liveness detection logic-only package ---
  facial_liveness_verification: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    # ── MobileFaceNet model ─────────────────────────────
    # Drop your mobilefacenet.tflite file into assets/models/
    # before running flutter pub get
    - assets/models/mobilefacenet.tflite
