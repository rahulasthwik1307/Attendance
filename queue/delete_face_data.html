<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f20d18",
                        "background-light": "#f8f5f6",
                        "background-dark": "#221011",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",

                },
            },

    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>

      min-height: max(884px, 100dvh);

<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display">

<header class="flex justify-between items-center mb-8">
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center">

</div>
<h1 class="text-xl font-bold text-slate-900 dark:text-slate-100">Face Settings</h1>
<div class="w-10 h-10"></div>
</header>
<div class="space-y-4">
<div class="h-48 w-full rounded-xl bg-slate-200 dark:bg-slate-800 flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover opacity-50" data-alt="User profile photo for face recognition" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6RNvJyowF9ScIZvKIGs9y-sLtdh_5qSiU9olmlVPWQ0gU7s-AhrhMAuDYBoCgVBkMIPZ9BwyuE5gqnmTZkIveKIkB_Q7hb5GDfCTdD9GmZ6cvx0ZMWzRF-vL8IOCFxVS7F3o24A_NFD_8fwtjAaxCOdPnAh8XkxUJjxz4PXjwi4LsOzfYXp_vLp5cIh-y_i8M4Vv534dOlYcnnwKGGCv8ksg81clEtSc13GH1RKiCJQnnNlw5nE_60LsZPMSk_lz4MqeqPmwcnPO5"/>
</div>
<div class="h-4 w-1/2 bg-slate-200 dark:bg-slate-800 rounded"></div>
<div class="h-12 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="h-12 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
<!-- Modal Card -->
<div class="w-full max-w-[340px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden flex flex-col animate-in fade-in zoom-in duration-300">
<!-- Modal Content -->
<div class="p-6 pt-8 flex flex-col items-center text-center">
<!-- Icon Header -->
<div class="mb-5 flex items-center justify-center w-16 h-16 rounded-full bg-primary/10">
<span class="material-symbols-outlined text-primary text-4xl">delete_forever</span>
</div>
<!-- Text Block -->
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100 mb-2 leading-tight">
                    Delete Face Data?
                </h2>
<p class="text-[15px] leading-relaxed text-slate-500 dark:text-slate-400 px-2">
                    This action cannot be undone. You will need to register your face again to use Smart Attendance.
                </p>
</div>
<!-- Action Buttons -->
<div class="p-4 pt-0 flex flex-row gap-3">
<!-- Cancel Button -->
<button class="flex-1 h-12 flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 bg-transparent text-slate-600 dark:text-slate-300 font-semibold text-[15px] transition-colors hover:bg-slate-50 dark:hover:bg-slate-800">
                    Cancel
                </button>
<!-- Delete Button -->
<button class="flex-1 h-12 flex items-center justify-center rounded-lg bg-primary text-white font-semibold text-[15px] shadow-lg shadow-primary/20 transition-all hover:bg-primary/90 active:scale-95">
                    Delete
                </button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Mockup Visual) -->
<div class="fixed bottom-0 w-full max-w-md h-20 border-t border-slate-100 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex justify-around items-center px-6 opacity-40 pointer-events-none">
<span class="material-symbols-outlined text-slate-400">home</span>
<span class="material-symbols-outlined text-primary">person</span>
<span class="material-symbols-outlined text-slate-400">calendar_today</span>
